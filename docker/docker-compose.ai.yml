services:
  ai-service:
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: uno-ai-service
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BACKEND_GATEWAY_URL=${BACKEND_GATEWAY_URL:-http://host.docker.internal:8088}
    networks:
      - uno-network

networks:
  uno-network:
